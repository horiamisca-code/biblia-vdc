<!DOCTYPE html>
<html lang="ro">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Biblia VDC</title>

    <link rel="stylesheet" href="style.css">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#007AFF">

</head>
<body>

<header>

    <h1>Biblia VDC</h1>

    <button id="continueButton">
        📖 Continuă de unde ai rămas
    </button>

    <div class="search">

        <input
            type="text"
            id="reference"
            placeholder="Ioan 3:16 sau dragoste">

        <button id="goButton">
            Mergi
        </button>

    </div>

    <section id="searchResults"></section>

</header>

<main>

    <div class="selectors">

        <label for="book">Cartea</label>
        <select id="book"></select>

        <label for="chapter">Capitolul</label>
        <select id="chapter"></select>

        <label for="verse">Versetul</label>
        <select id="verse"></select>

    </div>

    <section id="reader"></section>

</main>

<script src="js/bible.js"></script>
<script src="js/ui.js"></script>
<script src="js/storage.js"></script>
<script src="js/search.js"></script>
<script src="js/app.js"></script>

</body>
</html>
